<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Semantia</title>

  <style>
    :root {
      --bg-main: #0a0b10;
      --bg-panel: #161925;
      --accent-color: #00FF00;
      --text-main: #e2e8f0;
      --text-muted: #8b949e;
      --border-radius: 12px;
    }

    body {
      margin: 0;
      padding: 20px;
      background-color: var(--bg-main);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    /* --- NEW: Fast Mode Hiding Rules --- */
    body.fast-mode canvas[id]:not(#canvas):not(#canvas2):not(#canvas3):not(#canvasOverlay),
    body.fast-mode>span {
      display: none !important;
    }

    .app-container {
      max-width: 1000px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 24px;
      background: var(--bg-panel);
      border-radius: var(--border-radius);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
      border: 1px solid #2a2d3d;
    }

    .header h1 {
      margin: 0;
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .header h1 span {
      color: var(--accent-color);
    }

    .fast-mode-label {
      color: var(--accent-color);
      font-weight: bold;
      margin-left: auto;
      margin-right: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-buttons {
  display: flex;
  gap: 10px;
}

button.action-btn {
  border: none;
  padding: 12px 20px;
  font-size: 1rem;
  font-weight: bold;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s ease-in-out;
  color: #000;
}

button.action-btn:active {
  transform: translateY(1px);
}

/* Start Button - Green */
.btn-start {
  background-color: #00FF00;
  box-shadow: 0 4px 12px rgba(0, 255, 0, 0.2);
}
.btn-start:hover {
  background-color: #33ff33;
  box-shadow: 0 6px 16px rgba(0, 255, 0, 0.4);
  transform: translateY(-1px);
}

/* Export Button - Blue */
.btn-export {
  background-color: #00BFFF;
  box-shadow: 0 4px 12px rgba(0, 191, 255, 0.2);
}
.btn-export:hover {
  background-color: #33CCFF;
  box-shadow: 0 6px 16px rgba(0, 191, 255, 0.4);
  transform: translateY(-1px);
}

/* Reset Button - Red */
.btn-reset {
  background-color: #FF4444;
  color: #FFF; /* White text for better contrast on red */
  box-shadow: 0 4px 12px rgba(255, 68, 68, 0.2);
}
.btn-reset:hover {
  background-color: #FF6666;
  box-shadow: 0 6px 16px rgba(255, 68, 68, 0.4);
  transform: translateY(-1px);
}

    .dashboard {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }

    .panel {
      background: var(--bg-panel);
      padding: 20px;
      border-radius: var(--border-radius);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
      border: 1px solid #2a2d3d;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .panel-wide {
      grid-column: 1 / -1;
    }

    .panel h3, .panel h4 {
      margin: 0 0 15px 0;
      width: 100%;
      border-bottom: 1px solid #2a2d3d;
      padding-bottom: 10px;
      color: var(--text-muted);
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .panel canvas {
      background-color: #000;
      border-radius: 8px;
      box-shadow: inset 0 0 0 1px #333;
    }

    #vistats {
      font-family: 'Courier New', Courier, monospace;
      font-size: 1.1rem;
      margin: 0;
      color: var(--accent-color);
    }

    .learned-features-container {
      max-width: 1000px;
      margin: 40px auto 0 auto;
    }

    .learned-features-container h3 {
      color: var(--text-muted);
      border-top: 2px dashed var(--bg-panel);
      padding-top: 20px;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    canvas[id]:not(#canvas):not(#canvas2):not(#canvas3):not(#canvasOverlay) {
      margin: 4px;
      border-radius: 4px;
      border: 1px solid #333;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.6);
      transition: border-color 0.2s;
    }

    span {
      display: inline-block;
      width: 2px;
    }

    @media (max-width: 650px) {
      .header {
        flex-direction: column;
        align-items: flex-start;
        gap: 15px;
      }

      .fast-mode-label {
        margin-left: 0;
        margin-right: 0;
      }

      button.start-btn {
        margin-left: 0;
        margin-right: 10px;
      }
    }
  </style>
</head>

<!-- Start the body in fast-mode by default -->

<body class="fast-mode">

  <div class="app-container">
    <div class="header">
      <h1>Semantia</h1>
      <label class="fast-mode-label">
        <!-- Added onchange event -->
        <input type="checkbox" id="fastModeCheckbox" checked onchange="toggleFastMode()"> Fast Mode (Optimal
        Visualization)
        </label>
        <div class="header-buttons">
          <button class="action-btn btn-start" onclick="start()">Start</button>
          <button class="action-btn btn-export" onclick="exportState()">Export</button>
          <button class="action-btn btn-reset" onclick="reset()">Reset</button>
        </div>
        
        </div>
    <div class="dashboard">
      <div class="panel">
        <h3>Live Video Feed</h3>
        <h4 id="conf">Max confidence:</h4>
        <div style="position: relative; width: 200px; height: 200px;">
          <!-- Base Video Canvas -->
          <canvas id="canvas" width="200" height="200"
            style="position: absolute; top: 0; left: 0; z-index: 1;"></canvas>
          <!-- Highlight Overlay Canvas -->
          <canvas id="canvasOverlay" width="200" height="200"
            style="position: absolute; top: 0; left: 0; z-index: 2; pointer-events: none; background: transparent;"></canvas>
        </div>
      </div>
    </div>


    <div class="panel">
      <h3>Visual Feature Pool</h3>
      <canvas id="canvas3" width="200" height="200"></canvas>
    </div>

    <div class="panel panel-wide">
      <h3>Audio Spectrogram</h3>
      <canvas id="canvas2" width="800" height="150" style="width: 100%; max-width: 800px;"></canvas>
    </div>

    <div class="panel panel-wide">
      <h3>Audio Token Feed</h3>
      <div id="audioTokenFeed"
        style="font-family: 'Courier New', Courier, monospace; color: var(--accent-color); font-size: 1.1rem; word-break: break-all; max-height: 100px; overflow-y: auto; width: 100%;">
        Waiting for tokens...
      </div>
    </div>
  </div>

  <div class="panel panel-wide">
    <h3>System Statistics</h3>
    <p id="vistats">Awaiting system initialization...</p>
  </div>
  </div>

  <div class="learned-features-container">
    <h3>Learned Visual Features</h3>
  </div>

  <div style="display:none"><video id="video"></video></div>
  <script src="utils.js"></script>
  <script src="gpu4.js"></script>
  <script src="image.js"></script>
  <script src="brain.js"></script>
  <script src="audio.js"></script>

</body>

</html>
